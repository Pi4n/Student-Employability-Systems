<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>Activity Logger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/styles.css" rel="stylesheet" />
  </head>
  <body>
    <main class="container py-4">
      <h3 class="mb-3">Live Log Verification Entry Console</h3>
      <div class="card shadow">
        <div class="card-body">
          <form id="enrollmentForm" class="row g-3">
            <div class="col-md-6"><label class="form-label">Select Student Target</label><select class="form-select" id="enr_student"></select></div>
            <div class="col-md-6"><label class="form-label">Select Registered Course</label><select class="form-select" id="enr_course"></select></div>
            <div class="col-md-4"><label class="form-label">Target Semester</label><input class="form-control" id="enr_semester" placeholder="e.g. Sem 1" required /></div>
            <div class="col-md-4"><label class="form-label">Academic Standing Status</label><select class="form-select" id="enr_status"><option value="Completed">Completed</option><option value="In Progress">In Progress</option></select></div>
            <div class="col-md-4"><label class="form-label">Achieved Mark Grade Value</label><select class="form-select" id="enr_grade"><option value="A+">A+</option><option value="A">A</option><option value="A-">A-</option><option value="B+">B+</option><option value="B">B</option><option value="F">F</option></select></div>
            <div class="col-12"><button class="btn btn-primary" type="submit">Write Log Transaction Entry</button></div>
          </form>
          <div id="logStatus" class="small mt-2"></div>
        </div>
      </div>
      <div id="emptyState" class="alert alert-info mt-3 d-none">Prerequisite database records are missing. Please add a Program and Student row inside Management console first.</div>
    </main>
    <script src="assets/app.js"></script>
    <script src="assets/logging.js"></script>
  </body>
</html>
