<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>Performance Metric Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/styles.css" rel="stylesheet" />
  </head>
  <body>
    <main class="container py-4">
      <h2 class="mb-4">Dynamic Student Marketability Metrics</h2>
      <label class="form-label">Active Evaluation View</label>
      <select id="studentSelect" class="form-select mb-4"></select>
      
      <div class="row g-3">
        <div class="col-md-6">
          <div class="card bg-dark border-secondary p-3 text-center shadow-sm">
            <div class="text-uppercase tracking-wider text-muted small">Computed Index Outcome</div>
            <div class="display-3 fw-bold my-2 text-info" id="miValue">—</div>
            <div id="miExplain" class="small text-secondary">—</div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card p-3 shadow-sm h-100">
            <h6>Data Verification Audit Ledger</h6>
            <div id="acadDetail" class="text-secondary small mt-2">Connecting to live records...</div>
          </div>
        </div>
      </div>
      <div id="emptyState" class="alert alert-warning mt-3 d-none">No student records found in your database. Register students inside Management to update this screen.</div>
    </main>
    <script src="assets/app.js"></script>
    <script src="assets/dashboard.js"></script>
  </body>
</html>
