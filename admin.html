<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>Admin System Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/styles.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-app">
      <div class="container"><a class="navbar-brand fw-semibold" href="./index.html">Marketability Base</a></div>
    </nav>
    <main class="container py-4">
      <h2 class="mb-4">Database Records Administration</h2>
      
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="text-primary mb-3">Add Core Educational Track Program</h5>
          <form id="liveProgramForm" class="row g-3">
            <div class="col-md-4"><label class="form-label">Program Name</label><input class="form-control" id="prog_name" required /></div>
            <div class="col-md-4"><label class="form-label">Faculty Department</label><input class="form-control" id="prog_faculty" required /></div>
            <div class="col-md-4"><label class="form-label">Total Core Credits</label><input class="form-control" type="number" id="prog_credits" required /></div>
            <div class="col-12"><button class="btn btn-primary" type="submit">Publish Track to Database</button></div>
          </form>
        </div>
      </div>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="text-primary mb-3">Register New Student Row</h5>
          <form id="liveStudentForm" class="row g-3">
            <div class="col-md-4"><label class="form-label">Full Legal Name</label><input class="form-control" id="stu_name" required /></div>
            <div class="col-md-4"><label class="form-label">Matric Identification No</label><input class="form-control" id="stu_matric" required /></div>
            <div class="col-md-4"><label class="form-label">Active Email Address</label><input class="form-control" type="email" id="stu_email" required /></div>
            <div class="col-md-12"><label class="form-label">Assign Academic Track Program</label><select class="form-select" id="stu_program_id"></select></div>
            <div class="col-12"><button class="btn btn-success" type="submit">Commit Student to Schema</button></div>
          </form>
          <div id="adminStatus" class="small mt-2"></div>
        </div>
      </div>
    </main>
    <script src="assets/app.js"></script>
    <script src="assets/admin.js"></script>
  </body>
</html>
