<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/styles.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-app">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Marketability App</a>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="./dashboard.html">Student Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="./logging.html">Activity Logging</a></li>
            <li class="nav-item"><a class="nav-link active" href="./admin.html">Admin Management</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div id="loginSection" class="row justify-content-center login-wrap">
        <div class="col-md-4">
          <div class="card shadow">
            <div class="card-body">
              <h1 class="h5 mb-3">Admin Authentication</h1>
              <form id="loginForm">
                <div class="mb-2">
                  <label class="form-label small">Username</label>
                  <input class="form-control" id="adminUser" required />
                </div>
                <div class="mb-3">
                  <label class="form-label small">Password</label>
                  <input class="form-control" type="password" id="adminPass" required />
                </div>
                <div id="loginError" class="alert alert-danger small py-2 d-none">Invalid credentials.</div>
                <button class="btn btn-primary w-100 btn-sm" type="submit">Login</button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <div id="adminPanel" class="row g-4 d-none">
        <div class="col-md-4">
          <div class="card shadow-sm mb-3">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <span class="small text-secondary">Learning Outcomes</span>
                <span class="badge text-bg-primary fs-6" id="countLO">0</span>
              </div>
            </div>
          </div>

          <div class="card shadow-sm">
            <div class="card-body">
              <h2 class="h6 mb-3" id="formTitle">Manage Learning Outcome</h2>
              <form id="loForm">
                <input type="hidden" id="lo_id" />
                <div class="mb-2">
                  <label class="form-label small">Outcome Code</label>
                  <input class="form-control form-control-sm" id="lo_code" placeholder="e.g. LO1" required />
                </div>
                <div class="mb-2">
                  <label class="form-label small">Domain</label>
                  <select class="form-select form-select-sm" id="domain">
                    <option value="Academic">Academic</option>
                    <option value="Technical">Technical</option>
                    <option value="Social">Social</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label small">Description</label>
                  <textarea class="form-control form-control-sm" id="description" rows="3" required></textarea>
                </div>
                <div class="d-flex gap-2">
                  <button class="btn btn-primary btn-sm flex-grow-1" type="submit">Save to Database</button>
                  <button class="btn btn-outline-secondary btn-sm" type="button" id="clearBtn">Clear</button>
                </div>
              </form>
              <div id="adminStatus" class="small mt-2"></div>
            </div>
          </div>
        </div>

        <div class="col-md-8">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <div class="fw-semibold">Learning Outcomes List</div>
                <input class="form-control form-control-sm" id="filter" placeholder="Search code/description..." style="max-width: 220px" />
              </div>
              <hr class="my-3" />
              <div class="table-responsive">
                <table class="table table-sm table-hover align-middle">
                  <thead>
                    <tr>
                      <th>Code</th>
                      <th>Domain</th>
                      <th>Description</th>
                    </tr>
                  </thead>
                  <tbody id="loTable"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="assets/app.js"></script>
    <script src="assets/admin.js"></script>
  </body>
</html>
